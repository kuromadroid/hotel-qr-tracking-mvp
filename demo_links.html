<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>ホテルA/B 仮URL一覧</title>
  <style>
    body{margin:0;background:#f6f3ee;color:#202020;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif}
    header{background:linear-gradient(135deg,#195d64,#2a7b83);color:white;padding:24px 18px}
    h1{margin:0 0 8px;font-size:25px}
    header p{margin:0;line-height:1.7;font-size:14px;opacity:.93}
    main{max-width:980px;margin:0 auto;padding:18px}
    .card{background:white;border:1px solid #ded7cc;border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 12px 30px rgba(20,10,0,.06)}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{border-bottom:1px solid #eee8de;text-align:left;padding:10px 8px;vertical-align:top}
    th{background:#fbfaf8;color:#666;font-size:12px}
    a{color:#195d64;font-weight:800;text-decoration:none}
    code{background:#f0ece5;padding:2px 5px;border-radius:5px;font-size:12px;word-break:break-all}
    .note{background:#fff8ed;border:1px solid #eed3ab;border-radius:14px;padding:12px;color:#704c1d;font-size:13px;line-height:1.75}
    .urlbox{word-break:break-all}
    button{border:1px solid #ded7cc;background:white;border-radius:999px;padding:8px 10px;font-weight:800;cursor:pointer;font-size:12px}
  </style>
</head>
<body>
<header>
  <h1>ホテルA/B 仮URL一覧</h1>
  <p>公開後、この画面に表示されるURLをQR化します。ホテルA/Bごとに別URLなので、レポートで流入元を分けられます。</p>
</header>
<main>
  <div class="card note">
    まずは下の「開く」からテストしてください。スマホ実機でQR読み取りをするには、Vercel公開後のURLを俺に送ってくれればQR画像を作り直せます。
  </div>

  <div class="card">
    <h2 style="margin-top:0;">テストURL</h2>
    <table>
      <thead><tr><th>用途</th><th>開く</th><th>URL</th></tr></thead>
      <tbody id="linkRows"></tbody>
    </table>
  </div>

  <div class="card">
    <h2 style="margin-top:0;">次に見る画面</h2>
    <p><a href="report.html">計測レポート画面へ →</a></p>
  </div>
</main>

<script>
const base = location.href.replace(/demo_links\.html.*$/, "");
const links = [
  {
    name: "ホテルA / 北海炉端みなと / プレミアム枠",
    path: "index.html?hotel=hotel_a&hotel_name=ホテルA&shop=minato&slot=premium&edition=2026_summer&qr=qr_hotelA_minato_premium_2026summer"
  },
  {
    name: "ホテルB / 北海炉端みなと / プレミアム枠",
    path: "index.html?hotel=hotel_b&hotel_name=ホテルB&shop=minato&slot=premium&edition=2026_summer&qr=qr_hotelB_minato_premium_2026summer"
  }
];
document.getElementById("linkRows").innerHTML = links.map((l, i) => {
  const url = base + l.path;
  return `<tr>
    <td>${l.name}</td>
    <td><a href="${l.path}">開く</a></td>
    <td class="urlbox"><code id="url${i}">${url}</code><br><button onclick="navigator.clipboard.writeText('${url.replaceAll("'", "%27")}')">URLコピー</button></td>
  </tr>`;
}).join("");
</script>
</body>
</html>
