<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>札幌ホテルマップ</title>

  <style>
    :root{
      --bg:#f6f3ee;
      --card:#fff;
      --ink:#202020;
      --muted:#666;
      --line:#ded7cc;
      --accent:#195d64;
      --accent2:#b46927;
      --red:#963d35;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Sans",
        "Yu Gothic",
        "Noto Sans JP",
        sans-serif;
    }

    [hidden]{
      display:none!important;
    }

    header{
      background:linear-gradient(135deg,#195d64,#2a7b83);
      color:white;
      padding:24px 18px 20px;
    }

    .header-inner{
      max-width:1040px;
      margin:0 auto;
    }

    h1{
      margin:8px 0;
      font-size:25px;
      line-height:1.25;
    }

    header p{
      margin:0;
      font-size:14px;
      line-height:1.7;
      opacity:.94;
    }

    .small{
      font-size:12px;
      opacity:.88;
      letter-spacing:.08em;
    }

    main{
      max-width:1040px;
      margin:0 auto;
      padding:18px;
      display:grid;
      grid-template-columns:1fr;
      gap:16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 12px 30px rgba(20,10,0,.06);
      padding:16px;
    }

    .shop{
      display:grid;
      gap:18px;
    }

    @media(min-width:720px){
      .shop{
        grid-template-columns:minmax(260px,360px) 1fr;
      }
    }

    .photo{
      min-height:260px;
      border-radius:16px;
      background:linear-gradient(135deg,#d7eef3,#fff5e6);
      display:grid;
      place-items:center;
      color:#33636a;
      font-size:28px;
      font-weight:800;
      position:relative;
      overflow:hidden;
      background-size:cover;
      background-position:center;
    }

    .photo.has-image{
      color:white;
      text-shadow:0 2px 12px rgba(0,0,0,.5);
    }

    .photo.has-image::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(
        to top,
        rgba(0,0,0,.42),
        rgba(0,0,0,.02) 60%
      );
    }

    .photo span{
      position:relative;
      z-index:1;
    }

    .badge-list{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-bottom:8px;
    }

    .badge{
      display:inline-flex;
      border-radius:999px;
      background:#fff2dc;
      color:#8b4e17;
      font-size:12px;
      font-weight:800;
      padding:5px 10px;
    }

    .catchcopy{
      margin:12px 0 6px;
      font-size:18px;
      line-height:1.55;
      font-weight:800;
      color:#2c4f53;
    }

    .muted{
      color:var(--muted);
      font-size:13px;
      line-height:1.75;
    }

    .desc{
      font-size:14px;
      line-height:1.9;
      color:#3d3832;
    }

    .tag-list{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin:12px 0;
    }

    .tag{
      display:inline-flex;
      border-radius:999px;
      background:#f3f0ea;
      color:#514a42;
      font-size:12px;
      padding:6px 9px;
      border:1px solid #ebe4da;
    }

    .details{
      display:grid;
      gap:0;
      margin-top:14px;
      background:#fbfaf7;
      border:1px solid var(--line);
      border-radius:14px;
      padding:4px 12px;
    }

    .detail-row{
      display:grid;
      grid-template-columns:90px 1fr;
      gap:10px;
      padding:10px 0;
      border-bottom:1px solid #eee8de;
      font-size:13px;
      line-height:1.6;
    }

    .detail-row:last-child{
      border-bottom:none;
    }

    .detail-row b{
      color:#554e47;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }

    button,
    a.btn{
      appearance:none;
      border:1px solid var(--line);
      border-radius:999px;
      background:white;
      color:var(--ink);
      text-decoration:none;
      font-size:14px;
      padding:11px 14px;
      cursor:pointer;
      font-weight:700;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
    }

    .primary{
      background:var(--accent);
      border-color:var(--accent);
      color:white!important;
    }

    .green{
      background:#eff8f6;
      border-color:#cde4df;
      color:#195d64!important;
    }

    .orange{
      background:#fff5e8;
      border-color:#f1d6af;
      color:#8b4e17!important;
    }

    .danger{
      background:#fff1ef;
      border-color:#ebc6c1;
      color:#963d35!important;
    }

    .coupon{
      display:none;
      background:#fffaf0;
      border:1px dashed #d39e58;
      border-radius:14px;
      padding:14px;
      margin-top:14px;
      color:#6f4516;
      font-size:14px;
      line-height:1.8;
    }

    .coupon.show{
      display:block;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
      margin-top:16px;
    }

    @media(min-width:600px){
      .gallery{
        grid-template-columns:repeat(3,1fr);
      }
    }

    .gallery img{
      width:100%;
      height:130px;
      object-fit:cover;
      border-radius:12px;
      border:1px solid var(--line);
      background:#eee;
    }

    .error-card{
      text-align:center;
      padding:40px 20px;
    }

    .error-card h2{
      margin-top:0;
    }

    .debug-panel{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
    }

    .debug-box{
      background:#fbfaf7;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      margin-top:12px;
    }

    .kv{
      display:grid;
      grid-template-columns:100px 1fr;
      gap:8px;
      padding:8px 0;
      border-bottom:1px solid #eee8de;
      font-size:13px;
      line-height:1.55;
      overflow-wrap:anywhere;
    }

    .kv:last-child{
      border-bottom:none;
    }

    .status{
      color:#555;
      font-size:12px;
      line-height:1.7;
      overflow-wrap:anywhere;
    }

    code{
      background:#f0ece5;
      padding:2px 5px;
      border-radius:5px;
      font-size:12px;
    }
        .header-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .language-button{
      appearance:none;
      border:1px solid rgba(255,255,255,.5);
      border-radius:999px;
      background:rgba(255,255,255,.15);
      color:white;
      padding:8px 12px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      white-space:nowrap;
    }

    .language-screen{
      position:fixed;
      inset:0;
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:linear-gradient(
        135deg,
        rgba(25,93,100,.98),
        rgba(42,123,131,.98)
      );
    }

    .language-card{
      position:relative;
      width:min(100%,440px);
      padding:28px 20px 22px;
      border-radius:24px;
      background:white;
      box-shadow:0 24px 70px rgba(0,0,0,.28);
      text-align:center;
    }

    .language-card h2{
      margin:0 0 6px;
      font-size:23px;
    }

    .language-card p{
      margin:0 0 20px;
      color:#666;
      font-size:14px;
    }

    .language-list{
      display:grid;
      gap:10px;
    }

    .language-choice{
      width:100%;
      min-height:50px;
      border:1px solid var(--line);
      border-radius:14px;
      background:white;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }

    .language-choice:hover{
      border-color:var(--accent);
      background:#eff8f6;
    }

    .language-close{
      position:absolute;
      top:12px;
      right:14px;
      width:34px;
      height:34px;
      padding:0;
      border:none;
      border-radius:50%;
      background:#f3f0ea;
      font-size:20px;
      cursor:pointer;
    } 
  </style>

  <!-- 店舗情報 -->
  <script src="./data.js"></script>

  <!-- Supabase接続情報 -->
  <script src="./config.js"></script>
</head>

import { createClient }

  "zh-tw": {

    pageSubtitle: "為您介紹飯店附近值得推薦的餐廳。",
    reserve: "前往預約",
    map: "查看Google地圖",

const params = new URLSearchParams(location.search);
const appData = window.APP_DATA || {};
const settings = appData.settings || {};
const hotels = appData.hotels || {};
const shops = appData.shops || {};

const supportedLanguages =
  settings.supportedLanguages ||
  ["ja", "en", "zh-cn", "zh-tw", "ko"];

const fallbackLanguage =
  settings.fallbackLanguage || "ja";

const urlLanguage =
  params.get("lang");

const storedLanguage =
  localStorage.getItem("hotelMapLanguage");

const hasLanguageChoice =
  Boolean(urlLanguage || storedLanguage);

const requestedLanguage =
  urlLanguage ||
  storedLanguage ||
  settings.defaultLanguage ||
  "ja";

const currentLang =
  supportedLanguages.includes(requestedLanguage)
    ? requestedLanguage
    : fallbackLanguage;

if(
  urlLanguage &&
  supportedLanguages.includes(urlLanguage)
){
  localStorage.setItem(
    "hotelMapLanguage",
    urlLanguage
  );
}
document.documentElement.lang =
  currentLang === "zh-cn"
    ? "zh-CN"
    : currentLang === "zh-tw"
      ? "zh-TW"
      : currentLang;

const ui =
  UI_TEXT[currentLang] ||
  UI_TEXT[fallbackLanguage] ||
  UI_TEXT.ja;

const hotelId =
  params.get("hotel") ||
  Object.keys(hotels)[0] ||
  "hotel_a";

const shopId =
  params.get("shop") ||
  Object.keys(shops)[0] ||
  "";

const slot =
  params.get("slot") || "standard";

const edition =
  params.get("edition") || "2026_summer";

const qrId =
  params.get("qr") ||
  `qr_${hotelId}_${shopId}_${slot}_${edition}`;

const debugMode =
  params.get("debug") === "1";

const fallbackShop = shops[shopId];
const hotel = hotels[hotelId] || {};

const statusEl =
  document.getElementById("status");

const cfg =
  window.SUPABASE_CONFIG || {};

const isConfigured =
  cfg.url &&
  cfg.anonKey &&
  !cfg.url.includes("PASTE_") &&
  !cfg.anonKey.includes("PASTE_");

const supabase =
  isConfigured
    ? createClient(cfg.url, cfg.anonKey)
    : null;
  async function fetchShopFromSupabase(){
  if(!supabase){
    return null;
  }

  const { data, error } = await supabase
    .from("shops")
    .select(`
      id,
      status,
      enabled,
      media,
      content,
      actions,
      coupon,
      hotel_overrides
    `)
    .eq("id", shopId)

.eq("status", "published")
.eq("enabled", true)    
    .maybeSingle();

  if(error){
    console.error(
      "店舗情報の取得に失敗しました：",
      error
    );

    return null;
  }

  if(!data){
    return null;
  }

  return {
    enabled: data.enabled,
    media: data.media || {
      hero: "",
      gallery: []
    },
    content: data.content || {},
    actions: data.actions || {},
    coupon: data.coupon || {},
    hotelOverrides: data.hotel_overrides || {}
  };
}
function getLocalizedValue(values, language = currentLang){
  if(!values){
    return "";
  }

  if(typeof values === "string"){
    return values;
  }

  return (
    values[language] ||
    values[fallbackLanguage] ||
    values.ja ||
    values.en ||
    Object.values(values)[0] ||
    ""
  );
}

function getLocalizedContent(content){
  if(!content){
    return null;
  }

  return (
    content[currentLang] ||
    content[fallbackLanguage] ||
    content.ja ||
    content.en ||
    Object.values(content)[0] ||
    null
  );
}

function mergeActions(baseActions = {}, overrideActions = {}){
  const keys = new Set([
    ...Object.keys(baseActions),
    ...Object.keys(overrideActions)
  ]);

  const result = {};

  keys.forEach(key => {
    result[key] = {
      ...(baseActions[key] || {}),
      ...(overrideActions[key] || {})
    };
  });

  return result;
}

function resolveShop(base){
  const override =
    base.hotelOverrides?.[hotelId] || {};

  return {
    ...base,
    ...override,

    media: {
      ...(base.media || {}),
      ...(override.media || {})
    },

    content: {
      ...(base.content || {}),
      ...(override.content || {})
    },

    actions: mergeActions(
      base.actions || {},
      override.actions || {}
    ),

    coupon: {
      ...(base.coupon || {}),
      ...(override.coupon || {}),

      text: {
        ...(base.coupon?.text || {}),
        ...(override.coupon?.text || {})
      }
    }
  };
}

function setText(id, value){
  const element = document.getElementById(id);

  if(element){
    element.textContent = value || "";
  }
}

function setButton(id, label, visible){
  const button = document.getElementById(id);

  button.textContent = label;
  button.hidden = !visible;
}

function createDebugRow(label, value){
  const row = document.createElement("div");
  row.className = "kv";

  const strong = document.createElement("b");
  strong.textContent = label;

  const span = document.createElement("span");
  span.textContent = String(value || "");

  row.append(strong, span);

  return row;
}

function showError(message){
  document.getElementById("shopCard").hidden = true;
  document.getElementById("errorCard").hidden = false;
  setText("errorMessage", message);
}

function renderHero(shop, content){
  const hero =
    document.getElementById("heroImage");

  const fallback =
    document.getElementById("heroFallback");

  fallback.textContent =
    content.category || content.name || "";

  if(shop.media?.hero){
    hero.style.backgroundImage =
      `url("${shop.media.hero}")`;

    hero.classList.add("has-image");
  }else{
    hero.style.backgroundImage = "";
    hero.classList.remove("has-image");
  }
}

function renderGallery(shop, content){
  const gallery =
    document.getElementById("gallery");

  gallery.innerHTML = "";

  const images =
    Array.isArray(shop.media?.gallery)
      ? shop.media.gallery.filter(Boolean)
      : [];

  if(images.length === 0){
    gallery.hidden = true;
    return;
  }

  images.forEach((imageUrl, index) => {
    const image =
      document.createElement("img");

    image.src = imageUrl;
    image.alt =
      `${content.name} ${index + 1}`;

    image.loading = "lazy";

    image.addEventListener("error", () => {
      image.remove();

      if(gallery.children.length === 0){
        gallery.hidden = true;
      }
    });

    gallery.appendChild(image);
  });

  gallery.hidden = false;
}

function renderTags(tags){
  const tagList =
    document.getElementById("tagList");

  tagList.innerHTML = "";

  const values =
    Array.isArray(tags)
      ? tags
      : [];

  values.forEach(tag => {
    const span =
      document.createElement("span");

    span.className = "tag";
    span.textContent = tag;

    tagList.appendChild(span);
  });

  tagList.hidden =
    values.length === 0;
}

function renderBadges(shop, content){
  const badgeList =
    document.getElementById("badgeList");

  badgeList.innerHTML = "";

  let badges = [];

  if(Array.isArray(content.badges)){
    badges = content.badges;
  }else{
    if(slot === "premium"){
      badges.push(ui.premium);
    }

    if(
      Object.keys(shop.content || {}).length > 1
    ){
      badges.push(ui.inbound);
    }
  }

  badges.forEach(label => {
    const badge =
      document.createElement("span");

    badge.className = "badge";
    badge.textContent = label;

    badgeList.appendChild(badge);
  });

  badgeList.hidden =
    badges.length === 0;
}

function renderDetailRow(rowId, value){
  const row =
    document.getElementById(rowId);

  row.hidden = !value;
}

function renderDebug(ctx){
  const panel =
    document.getElementById("debugPanel");

  if(!debugMode){
    panel.hidden = true;
    return;
  }

  panel.hidden = false;

  const box =
    document.getElementById("qrInfo");

  box.innerHTML = "";

  box.append(
    createDebugRow("ホテル", `${ctx.hotel_name} / ${ctx.hotel_id}`),
    createDebugRow("店舗", `${ctx.shop_name} / ${ctx.shop_id}`),
    createDebugRow("言語", ctx.language),
    createDebugRow("店舗データ", ctx.source),
    createDebugRow("掲載枠", ctx.slot),
    createDebugRow("版", ctx.edition),
    createDebugRow("QR ID", ctx.qr_id)
  );
}

function getVisitId(){
  const storageKey =
    "hotel_qr_visit_id";

  let visitId =
    sessionStorage.getItem(storageKey);

  if(!visitId){
    visitId =
      crypto.randomUUID();

    sessionStorage.setItem(
      storageKey,
      visitId
    );
  }

  return visitId;
}

async function logEvent(eventType, ctx){
  if(!supabase){
    if(statusEl){
      statusEl.textContent =
        "Supabase未設定です。config.jsを確認してください。";
    }

    return false;
  }

  const eventAliases = {
    reservation: "reservation_click",
    map: "map_click",
    instagram: "instagram_click",
    website: "website_click",
    phone: "phone_click",
    coupon: "coupon_click"
    coupon_view: "coupon_click"
};

  const normalizedEventType =
    eventAliases[eventType] || eventType;

  const allowedEventTypes = [
    "qr_scan",
    "page_view",
    "reservation_click",
    "map_click",
    "instagram_click",
    "website_click",
    "phone_click",
    "coupon_click"
  ];

  if(
    !allowedEventTypes.includes(
      normalizedEventType
    )
  ){
    console.warn(
      "未対応のイベントです：",
      eventType
    );

    return false;
  }

  const trackedUrl =
    new URL(location.href);

  trackedUrl.searchParams.set(
    "lang",
    currentLang
  );

  const qrCode =
    ctx.qr_code ||
    ctx.qr_id ||
    trackedUrl.searchParams.get("qr") ||
    "";

  if(normalizedEventType === "qr_scan"){
    const scanKey =
      `qr_scan_recorded_${qrCode}`;

    if(sessionStorage.getItem(scanKey)){
      return true;
    }
  }

  const payload = {
    visit_id: getVisitId(),

    event_type:
      normalizedEventType,

    hotel_id:
      ctx.hotel_id,

    shop_id:
      ctx.shop_id,

    qr_code:
      qrCode,

    slot:
      ctx.slot,

    edition:
      ctx.edition,

    language:
      currentLang || null,

    page_path:
      location.pathname,

    metadata: {
      hotel_name:
        ctx.hotel_name || null,

      shop_name:
        ctx.shop_name || null,

      page_url:
        trackedUrl.toString(),

      user_agent:
        navigator.userAgent
    }
  };

  const { error } =
    await supabase
      .from("events_v2")
      .insert(payload);

  if(error){
    console.error(
      "events_v2への保存に失敗：",
      error
    );

    if(statusEl){
      statusEl.textContent =
        `保存失敗：${error.message}`;
    }

    return false;
  }

  if(normalizedEventType === "qr_scan"){
    sessionStorage.setItem(
      `qr_scan_recorded_${qrCode}`,
      "true"
    );
  }

  if(statusEl){
    statusEl.textContent =
      `保存成功：${normalizedEventType}`;
  }

  return true;
}
  
function buildInternalUrl(url, ctx){
  const destination =
    new URL(url, location.href);

  if(destination.origin === location.origin){
    destination.searchParams.set(
      "from_hotel",
      ctx.hotel_id
    );

    destination.searchParams.set(
      "from_qr",
      ctx.qr_id
    );

    destination.searchParams.set(
      "shop",
      ctx.shop_id
    );

    destination.searchParams.set(
      "lang",
      currentLang
    );
  }

  return destination.toString();
}

async function moveToUrl(eventType, url, ctx){
  if(!url){
    return;
  }

  await logEvent(eventType, ctx);

  location.href =
    buildInternalUrl(url, ctx);
}
async function resolveQrRoute(){
  const params =
    new URLSearchParams(window.location.search);

  const qrCode =
    (params.get("qr") || "")
      .trim()
      .toLowerCase();

  // QRなしの直接アクセスは、
  // 現在のテスト用動作を残す
  if(!qrCode){
  return "missing";
}
  const {
    data,
    error
  } = await supabase
    .from("qr_routes")
    .select(
      "qr_code,hotel_id,shop_id,slot,edition,enabled"
    )
    .eq("qr_code", qrCode)
    .eq("enabled", true)
    .maybeSingle();

  if(error){
    console.error(
      "QRルートの取得に失敗しました：",
      error
    );

    throw error;
  }

  if(!data){
    return "invalid";
  }

  // URL内のhotelやshopを信用せず、
  // Supabaseの登録内容に直す
  const canonicalUrl =
    new URL(window.location.href);

  canonicalUrl.searchParams.set(
    "hotel",
    data.hotel_id
  );

  canonicalUrl.searchParams.set(
    "shop",
    data.shop_id
  );

  canonicalUrl.searchParams.set(
    "slot",
    data.slot
  );

  canonicalUrl.searchParams.set(
    "edition",
    data.edition
  );

  canonicalUrl.searchParams.set(
    "qr",
    data.qr_code
  );

  if(
    canonicalUrl.toString() !==
    window.location.href
  ){
    window.location.replace(
      canonicalUrl.toString()
    );

    return "redirecting";
  }

  return "resolved";
}
  async function initialize(){
  const qrResolution =
    await resolveQrRoute();

  if(qrResolution === "redirecting"){
    return;
  }

    if(qrResolution === "missing"){
  showError(
    "QRコードからアクセスしてください。"
  );

  return;
}
  if(qrResolution === "invalid"){
    showError(
      "このQRコードは無効、または現在利用できません。"
    );

    return;
  }
    
  setText("pageTitle", ui.pageTitle);
  setText("pageSubtitle", ui.pageSubtitle);

  document.title = ui.pageTitle;

  setText("priceLabel", ui.price);
  setText("hoursLabel", ui.hours);
  setText("closedLabel", ui.closed);

const databaseShop =
  await fetchShopFromSupabase();

const baseShop =
  databaseShop;

const shopSource =
  databaseShop
    ? "Supabase"
    : "未取得";

if(!baseShop){
  showError(
    "この店舗は現在公開されていません。"
  );

  return;
}
    if(!baseShop || baseShop.enabled === false){
    showError(`${ui.notFound} shop=${shopId}`);
    return;
  }

  const shop =
    resolveShop(baseShop);

  const content =
    getLocalizedContent(shop.content);

    return;
  }

  const hotelName =
    getLocalizedValue(hotel.name) ||

    hotel_name: hotelName,
    shop_id: shopId,
    shop_name: content.name || shopId,
    slot,
    edition,
    qr_id: qrId,

  document.getElementById("errorCard").hidden = true;
  document.getElementById("shopCard").hidden = false;

  renderHero(shop, content);
  renderGallery(shop, content);
  renderTags(content.tags);
  renderBadges(shop, content);

  setText("shopName", content.name);
  setText(
    "shopMeta",
    [
      content.category,
      content.area,
      content.access
    ].filter(Boolean).join(" / ")
  );

  setText("catchcopy", content.catchcopy);
  setText("description", content.description);

  setText("price", content.price);
  setText("hours", content.hours);
  setText("closed", content.closed);

  renderDetailRow("priceRow", content.price);
  renderDetailRow("hoursRow", content.hours);
  renderDetailRow("closedRow", content.closed);

  const actions =
    shop.actions || {};

  const reservationEnabled =
    actions.reservation?.enabled &&
    actions.reservation?.url;

  const mapEnabled =
    actions.map?.enabled &&
    actions.map?.url;

  const phoneEnabled =
    actions.phone?.enabled &&
    actions.phone?.value;

  const instagramEnabled =
    actions.instagram?.enabled &&
    actions.instagram?.url;

  const websiteEnabled =
    actions.website?.enabled &&
    actions.website?.url;

  const couponText =
    getLocalizedValue(shop.coupon?.text);

  const couponEnabled =
    shop.coupon?.enabled &&
    couponText;

  setButton(
    "reserveBtn",
    ui.reserve,
    reservationEnabled
  );

  setButton(
    "mapBtn",
    ui.map,
    mapEnabled
  );

  setButton(
    "phoneBtn",
    ui.phone,
    phoneEnabled
  );

  setButton(
    "instagramBtn",
    ui.instagram,
    instagramEnabled
  );

  setButton(
    "websiteBtn",
    ui.website,
    websiteEnabled
  );

  setButton(
    "couponBtn",
    ui.coupon,
    couponEnabled
  );

  if(reservationEnabled){
    document
      .getElementById("reserveBtn")
      .addEventListener("click", () => {
        moveToUrl(
          "reserve_click",
          actions.reservation.url,
          ctx
        );
      });
  }

  if(mapEnabled){
    document
      .getElementById("mapBtn")
      .addEventListener("click", () => {
        moveToUrl(
          "map_click",
          actions.map.url,
          ctx
        );
      });
  }

  if(phoneEnabled){
    document
      .getElementById("phoneBtn")
      .addEventListener("click", async () => {
        await logEvent(
          "phone_click",
          ctx
        );

        location.href =
          `tel:${actions.phone.value}`;
      });
  }

  if(instagramEnabled){
    document
      .getElementById("instagramBtn")
      .addEventListener("click", () => {
        moveToUrl(
          "instagram_click",
          actions.instagram.url,
          ctx
        );
      });
  }

  if(websiteEnabled){
    document
      .getElementById("websiteBtn")
      .addEventListener("click", () => {
        moveToUrl(
          "website_click",
          actions.website.url,
          ctx
        );
      });
  }

  if(couponEnabled){
    setText("couponText", couponText);

    const couponCode =
      shop.coupon?.code || "";

    setText("couponCode", couponCode);

    const codeWrap =
      document.getElementById("couponCodeWrap");

    codeWrap.hidden = !couponCode;

    if(couponCode){
      codeWrap.childNodes[0].textContent =
        `${ui.couponCode}：`;
    }

    document
      .getElementById("couponBtn")
      .addEventListener("click", async () => {
        document
          .getElementById("couponBox")
          .classList.toggle("show");

        await logEvent(
          "coupon_view",
          ctx
        );
      });
  }

  renderDebug(ctx);

  if(!isConfigured){
    if(statusEl){
      statusEl.textContent =
        "Supabase未設定です。config.jsを確認してください。";
    }

    return;
  }

  logEvent("qr_scan", ctx);
  logEvent("page_view", ctx);
}

  ko: "한국어"
};

languageButton.textContent =
  `🌐 ${languageNames[currentLang] || "Language"}`;

function openLanguageScreen(){
  languageScreen.hidden = false;
}

function closeLanguageScreen(){
  languageScreen.hidden = true;
}

function changeLanguage(language){
  if(!supportedLanguages.includes(language)){
    return;
  }

  localStorage.setItem(
    "hotelMapLanguage",
    language
  );

  const nextUrl =
    new URL(location.href);

  nextUrl.searchParams.set(
    "lang",
    language
  );

  location.href =
    nextUrl.toString();
}

document
  .querySelectorAll("[data-language]")
  .forEach(button => {
    button.addEventListener("click", () => {
      changeLanguage(
        button.dataset.language
      );
    });
  });

languageButton.addEventListener(
  "click",
  openLanguageScreen
);

closeLanguageButton.addEventListener(
  "click",
  closeLanguageScreen
);

if(!hasLanguageChoice){
  closeLanguageButton.hidden = true;
  openLanguageScreen();
}
