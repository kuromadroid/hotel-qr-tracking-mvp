<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1"
  >

  <title>店舗管理画面</title>

  <style>
    :root{
      --bg:#f5f3ee;
      --card:#fff;
      --ink:#202020;
      --muted:#666;
      --line:#ded7cc;
      --accent:#195d64;
      --danger:#963d35;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--ink);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Sans",
        "Yu Gothic",
        sans-serif;
    }

    header{
      background:var(--accent);
      color:white;
      padding:20px;
    }

    header div{
      max-width:760px;
      margin:0 auto;
    }

    header h1{
      margin:0;
      font-size:24px;
    }

    header p{
      margin:8px 0 0;
      font-size:13px;
      opacity:.9;
    }

    main{
      max-width:760px;
      margin:0 auto;
      padding:24px 16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:22px;
      box-shadow:0 12px 30px rgba(0,0,0,.06);
    }

    .field{
      display:grid;
      gap:7px;
      margin-bottom:16px;
    }

    label{
      font-size:13px;
      font-weight:700;
    }

    input{
      width:100%;
      min-height:46px;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:12px;
      font-size:16px;
      background:white;
    }

    input:focus{
      outline:2px solid rgba(25,93,100,.2);
      border-color:var(--accent);
    }

    button{
      appearance:none;
      border:none;
      border-radius:999px;
      padding:12px 18px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
    }

    .primary{
      background:var(--accent);
      color:white;
    }

    .secondary{
      background:#f0ece5;
      color:var(--ink);
    }

    .message{
      margin-top:14px;
      font-size:13px;
      line-height:1.7;
      color:var(--muted);
      overflow-wrap:anywhere;
    }

    .message.error{
      color:var(--danger);
    }

    .admin-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
    }

    .admin-header h2{
      margin:0;
      font-size:21px;
    }

    .placeholder{
      padding:18px;
      border:1px dashed var(--line);
      border-radius:14px;
      background:#fbfaf7;
      color:var(--muted);
      font-size:14px;
      line-height:1.8;
    }

    [hidden]{
      display:none!important;
    }
  </style>

  <script src="./config.js"></script>
</head>

<body>
<header>
  <div>
    <h1>店舗管理画面</h1>
    <p>ホテルマップ掲載情報の登録・編集</p>
  </div>
</header>

<main>
  <section class="card" id="loginCard">
    <h2 style="margin-top:0;">管理者ログイン</h2>

    <form id="loginForm">
      <div class="field">
        <label for="email">メールアドレス</label>
        <input
          type="email"
          id="email"
          autocomplete="username"
          required
        >
      </div>

      <div class="field">
        <label for="password">パスワード</label>
        <input
          type="password"
          id="password"
          autocomplete="current-password"
          required
        >
      </div>

      <button
        type="submit"
        class="primary"
        id="loginButton"
      >
        ログイン
      </button>
    </form>

    <div class="message" id="loginMessage"></div>
  </section>

  <section class="card" id="adminCard" hidden>
    <div class="admin-header">
      <div>
        <h2>管理者ページ</h2>
        <div class="message" id="userInfo"></div>
      </div>

      <button
        type="button"
        class="secondary"
        id="logoutButton"
      >
        ログアウト
      </button>
    </div>

   <div class="placeholder" id="shopListStatus">
  店舗情報を読み込んでいます...
</div>

<div id="shopList"></div>
    <div id="editForm" class="placeholder" hidden>
  <h2>店舗情報の編集</h2>

  <label for="editName">店舗名</label>
  <input id="editName" type="text">

  <label for="editCatchcopy">キャッチコピー</label>
  <input id="editCatchcopy" type="text">
      <label for="editDescription">店舗紹介文</label>
<textarea id="editDescription" rows="5"></textarea>

<label for="editAddress">住所</label>
<input id="editAddress" type="text">

<label for="editHours">営業時間</label>
<input id="editHours" type="text">
      
<label for="editStatus">公開状態</label>
<select id="editStatus">
  <option value="draft">下書き</option>
  <option value="published">公開</option>
  <option value="suspended">停止</option>
</select>

<label>
  <input id="editEnabled" type="checkbox">
  店舗ページを有効にする
</label>
      <button id="saveShopButton" type="button">
    保存
  </button>

  <button id="cancelEditButton" type="button">
    キャンセル
  </button>
</div> 
  </section>
</main>

<script type="module">
import {
  createClient
} from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const cfg =
  window.SUPABASE_CONFIG || {};

const loginCard =
  document.getElementById("loginCard");

const adminCard =
  document.getElementById("adminCard");

const loginForm =
  document.getElementById("loginForm");

const loginButton =
  document.getElementById("loginButton");

const loginMessage =
  document.getElementById("loginMessage");

const userInfo =
  document.getElementById("userInfo");

const logoutButton =
  document.getElementById("logoutButton");

if(!cfg.url || !cfg.anonKey){
  loginMessage.textContent =
    "Supabase接続設定が見つかりません。config.jsを確認してください。";

  loginMessage.classList.add("error");

  throw new Error(
    "Supabase configuration is missing."
  );
}

const supabase =
  createClient(
    cfg.url,
    cfg.anonKey
  );

function showLogin(message = "", isError = false){
  loginCard.hidden = false;
  adminCard.hidden = true;

  loginMessage.textContent = message;
  loginMessage.classList.toggle(
    "error",
    isError
  );
}

function showAdmin(user){
  loginCard.hidden = true;
  adminCard.hidden = false;

  userInfo.textContent =
    `ログイン中：${user.email || user.id}`;
  loadShops();
}
async function loadShops(){
  const status =
    document.getElementById("shopListStatus");

  const shopList =
    document.getElementById("shopList");

  status.hidden = false;
  status.classList.remove("error");
  status.textContent =
    "店舗情報を読み込んでいます...";

  shopList.innerHTML = "";

  const { data, error } = await supabase
    .from("shops")
    .select("id,status,enabled,content,updated_at")
    .order("updated_at", {
      ascending: false
    });

  if(error){
    console.error(error);

    status.textContent =
      `店舗情報の取得に失敗しました：${error.message}`;

    status.classList.add("error");
    return;
  }

  if(!data || data.length === 0){
    status.textContent =
      "登録されている店舗はありません。";
    return;
  }

  status.hidden = true;

  data.forEach(shop => {
    const item =
      document.createElement("div");

    item.className = "placeholder";
    item.style.marginTop = "12px";

    const name =
      shop.content?.ja?.name ||
      shop.content?.en?.name ||
      shop.id;

    const title =
      document.createElement("strong");

    title.textContent = name;

    item.appendChild(title);
    item.appendChild(document.createElement("br"));
    item.appendChild(
      document.createTextNode(`店舗ID：${shop.id}`)
    );
    item.appendChild(document.createElement("br"));
    item.appendChild(
      document.createTextNode(`公開状態：${shop.status}`)
    );
    item.appendChild(document.createElement("br"));
    item.appendChild(
      document.createTextNode(
        `有効：${shop.enabled ? "はい" : "いいえ"}`
      )
    );
item.appendChild(document.createElement("br"));

const editButton = document.createElement("button");
editButton.type = "button";
editButton.textContent = "編集";
editButton.style.marginTop = "12px";

editButton.addEventListener("click", () => {
  const editForm =
    document.getElementById("editForm");

  const editName =
    document.getElementById("editName");

  const editCatchcopy =
    document.getElementById("editCatchcopy");
  
  const editDescription =
  document.getElementById("editDescription");

const editAddress =
  document.getElementById("editAddress");

const editHours =
  document.getElementById("editHours"); 
  
  const editStatus =
  document.getElementById("editStatus");

const editEnabled =
  document.getElementById("editEnabled");
  editForm.dataset.shopId = shop.id;

  editName.value =
    shop.content?.ja?.name || "";

  editCatchcopy.value =
    shop.content?.ja?.catchcopy || "";
  editDescription.value =
  shop.content?.ja?.description || "";

editAddress.value =
  shop.content?.ja?.address || "";

editHours.value =
  shop.content?.ja?.hours || "";
  
  editStatus.value =
  shop.status || "draft";

editEnabled.checked =
  shop.enabled === true;
  editForm.hidden = false;

  editForm.scrollIntoView({
    behavior: "smooth"
  });
});
    
item.appendChild(editButton);
    shopList.appendChild(item);
  });
}
  document
  .getElementById("saveShopButton")
  .addEventListener("click", async () => {
    const editForm =
      document.getElementById("editForm");

    const editName =
      document.getElementById("editName");

    const editCatchcopy =
      document.getElementById("editCatchcopy");
    const editDescription =
  document.getElementById("editDescription");

const editAddress =
  document.getElementById("editAddress");

const editHours =
  document.getElementById("editHours");
    const editStatus =
  document.getElementById("editStatus");

const editEnabled =
  document.getElementById("editEnabled");
    const saveButton =
      document.getElementById("saveShopButton");

    const shopId = editForm.dataset.shopId;
    const name = editName.value.trim();
    const catchcopy = editCatchcopy.value.trim();
    const description =
  editDescription.value.trim();

const address =
  editAddress.value.trim();

const hours =
  editHours.value.trim();
    const status = editStatus.value;
const enabled = editEnabled.checked;
    
    if(!shopId){
      alert("編集する店舗が選択されていません。");
      return;
    }

    if(!name){
      alert("店舗名を入力してください。");
      return;
    }

    saveButton.disabled = true;
    saveButton.textContent = "保存中...";

    try{
      const {
        data: shop,
        error: readError
      } = await supabase
        .from("shops")
        .select("content")
        .eq("id", shopId)
        .single();

      if(readError){
        throw readError;
      }

      const updatedContent = {
        ...(shop.content || {})
      };

     updatedContent.ja = {
  ...(updatedContent.ja || {}),
  name: name,
  catchcopy: catchcopy,
  description: description,
  address: address,
  hours: hours
};
      
      const { error: updateError } =
        await supabase
          .from("shops")
         .update({
  content: updatedContent,
  status: status,
  enabled: enabled
})
        .eq("id", shopId);

      if(updateError){
        throw updateError;
      }

      alert("店舗情報を保存しました。");

      editForm.hidden = true;

      await loadShops();
    }catch(error){
      console.error(error);

      alert(
        `保存に失敗しました：${error.message}`
      );
    }finally{
      saveButton.disabled = false;
      saveButton.textContent = "保存";
    }
  });

document
  .getElementById("cancelEditButton")
  .addEventListener("click", () => {
    const editForm =
      document.getElementById("editForm");

    editForm.hidden = true;
    editForm.dataset.shopId = "";
  });
  async function verifyAdmin(){
  const {
    data: userData,
    error: userError
  } = await supabase.auth.getUser();

  if(userError || !userData.user){
    showLogin();
    return;
  }

  const {
    data: isAdmin,
    error: adminError
  } = await supabase.rpc("is_admin");

  if(adminError){
    console.error(adminError);

    await supabase.auth.signOut();

    showLogin(
      `管理者判定に失敗しました：${adminError.message}`,
      true
    );

    return;
  }

  if(isAdmin !== true){
    await supabase.auth.signOut();

    showLogin(
      "このアカウントには管理者権限がありません。",
      true
    );

    return;
  }

  showAdmin(userData.user);
}

loginForm.addEventListener(
  "submit",
  async event => {
    event.preventDefault();

    loginButton.disabled = true;
    loginButton.textContent =
      "ログイン中...";

    loginMessage.textContent = "";
    loginMessage.classList.remove("error");

    const email =
      document
        .getElementById("email")
        .value
        .trim();

    const password =
      document
        .getElementById("password")
        .value;

    const {
      error
    } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if(error){
      showLogin(
        `ログインに失敗しました：${error.message}`,
        true
      );

      loginButton.disabled = false;
      loginButton.textContent =
        "ログイン";

      return;
    }

    await verifyAdmin();

    loginButton.disabled = false;
    loginButton.textContent =
      "ログイン";
  }
);

logoutButton.addEventListener(
  "click",
  async () => {
    await supabase.auth.signOut();

    showLogin(
      "ログアウトしました。"
    );
  }
);

verifyAdmin().catch(error => {
  console.error(error);

  showLogin(
    "認証処理中にエラーが発生しました。",
    true
  );
});
</script>
</body>
</html>
